name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lightweight_charts_v5/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lightweight_charts_v5/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm audit --audit-level=high
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: lightweight_charts_v5/frontend/build
          if-no-files-found: error

  python:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: lightweight_charts_v5/frontend/build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Install wheel and e2e dependencies
        run: |
          python -m pip install dist/*.whl
          python -m pip install pytest playwright pytest-playwright requests
          playwright install --with-deps chromium
      - name: Run e2e smoke test
        run: pytest e2e/ -v
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
