name: Release to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lightweight_charts_v5/frontend/package-lock.json
      - name: Build frontend
        working-directory: lightweight_charts_v5/frontend
        run: |
          npm ci
          npm run build
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Check tag matches package version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "v$VERSION" = "$GITHUB_REF_NAME" || { echo "tag $GITHUB_REF_NAME != pyproject version $VERSION"; exit 1; }
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/streamlit-lightweight-charts-v5
    permissions:
      id-token: write  # OIDC for PyPI Trusted Publishing — no API tokens
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
