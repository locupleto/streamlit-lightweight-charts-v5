version: 2
updates:
  - package-ecosystem: npm
    directory: /lightweight_charts_v5/frontend
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
