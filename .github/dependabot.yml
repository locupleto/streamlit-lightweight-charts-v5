version: 2
updates:
  - package-ecosystem: npm
    directory: /lightweight_charts_v5/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    ignore:
      # React majors are a deliberate migration, not a dependency refresh:
      # react and react-dom must move together (Dependabot proposes them
      # separately, which cannot work), and streamlit-component-lib's own
      # react dependency range needs verifying first. Minor/patch still flow.
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      # Deliberately groups majors too, unlike npm-minor-patch above. The
      # workflows pin actions to major tags (actions/checkout@v7), which float
      # across minor/patch — so a major bump is the ONLY update Dependabot ever
      # proposes here, and a minor/patch group would never fire. One weekly PR
      # for the lot; if a member breaks CI, close it and take them singly.
      github-actions:
        patterns: ["*"]
